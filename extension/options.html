<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PasteGuard Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="settings">
    <header>
      <p>PasteGuard Web</p>
      <h1>Session settings</h1>
    </header>

    <section class="card">
      <h2>Privacy</h2>
      <label class="row"><span>Capture text snippets</span><input id="captureSnippets" type="checkbox" /></label>
      <p class="help">Keep disabled for real controlled-writing sessions unless every participant has consented.</p>
      <label>Snippet max characters<input id="snippetMaxChars" type="number" min="0" max="300" /></label>
    </section>

    <section class="card">
      <h2>Anomaly thresholds</h2>
      <label>Idle threshold, ms<input id="idleThresholdMs" type="number" min="1000" /></label>
      <label>Burst minimum characters<input id="burstMinChars" type="number" min="20" /></label>
      <label>Large insertion characters<input id="largeInsertionChars" type="number" min="20" /></label>
      <label>Paste streak count<input id="pasteStreakCount" type="number" min="2" /></label>
      <label>Paste streak window, ms<input id="pasteStreakWindowMs" type="number" min="1000" /></label>
      <label>Uniform cadence stddev, ms<input id="uniformCadenceStddevMs" type="number" min="5" /></label>
    </section>

    <button id="saveBtn">Save settings</button>
    <p id="status"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
